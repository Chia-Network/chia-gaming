# Build and Test (Windows x86_64) github action for chia-gaming
name: build-windows.yml

on:
  push:
    branches:
      - base
      - dev
    tags:
      - "**"
  release:
    types: [published]
  pull_request:
    branches:
      - "**"

env:
  RUST_VERSION: stable

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}--${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/long_lived/')) && github.sha || '' }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  test_windows:
    name: Test on Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build hex files
        run: |
          tools/build-chialisp.sh

      - name: Run tests on Windows
        run: |
          # Build without sim-tests to ensure that configuration compiles
          cargo test --no-run
          # Run simulator tests (matches local ct.sh)
          cargo test --lib --features sim-tests -- --nocapture

  release:
    name: Build deploy tarballs (Windows)
    if: github.event_name == 'release'
    needs: [test_windows]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Build deploy tarballs
        run: tools/build-deploy.sh --platform=windows

      - name: Verify deploy archives
        run: tools/test-deploy-archives.sh --platform=windows

      - name: Upload player app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chia-gaming-windows
          path: |
            deploy_player_app/chia-gaming-windows-*.tgz
            deploy_player_app/chia-gaming-windows-*.zip

      - name: Upload lobby artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chia-gaming-lobby-windows
          path: |
            deploy_tracker/chia-gaming-lobby-windows-*.tgz
            deploy_tracker/chia-gaming-lobby-windows-*.zip
