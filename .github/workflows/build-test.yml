# Build and Test (Linux x86_64) github action for chia-gaming
name: build-test.yml

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}--${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/long_lived/')) && github.sha || '' }}
  cancel-in-progress: true

env:
  GRCOV_VERSION: 0.8.1
  RUST_VERSION: stable

on:
  push:
    branches:
      - base
      - dev
  release:
    types: [published]
  pull_request:
    branches:
      - '**'

permissions:
  id-token: write
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-22.04
    name: cargo fmt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "clippy, rustfmt"
      - name: fmt
        run: |
          rustup component add --toolchain stable-x86_64-unknown-linux-gnu clippy rustfmt
          cargo fmt --version
          cargo fmt -- --files-with-diff --check

  clippy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "clippy, rustfmt"
      - name: clippy
        run: |
          set -x
          rustup component add --toolchain stable-x86_64-unknown-linux-gnu clippy rustfmt
          cargo clippy --version
          cargo clippy --all --features=sim-tests,sim-server -- -D warnings
          cargo check --features=sim-tests,sim-server --tests

  unit_tests:
    runs-on: ubuntu-22.04
    name: Unit tests - build-test.yml
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "clippy, rustfmt"

      - name: Build hex files
        run: |
          tools/build-chialisp.sh

      - name: Run rust tests and simulator tests
        run: |
          # Build without sim-tests to ensure that configuration compiles
          cargo test --no-run
          # Run simulator tests (matches local ct.sh)
          cargo test --lib --features sim-tests,sim-server -- --nocapture

  coverage:
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "clippy, rustfmt"
      - name: Run for coverage
        run: |
          cp build.rs.disabled build.rs
          sudo apt-get update
          sudo apt-get install lcov -y
          rustup component add llvm-tools-preview
          cargo install --version $GRCOV_VERSION grcov
          export RUSTFLAGS="-Cinstrument-coverage"
          export LLVM_PROFILE_FILE=$(pwd)/target/chialisp-%p-%m.profraw
          export CARGO_TARGET_DIR=$(pwd)/target
          cargo test --lib --features sim-tests,sim-server -- --nocapture
          grcov . --binary-path target -s . --branch --ignore-not-existing --ignore='*/.cargo/*' --ignore='*/tests/*' -o rust_cov.info
          python3 -c 'with open("rust_cov.info") as f: lines = [l for l in f if not (l.startswith("DA:") and int(l.split(",")[1].strip()) >= 2**63)]; open("lcov.info", "w").writelines(lines)'
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        if: always()
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        with:
          path-to-lcov: './lcov.info'
          fail-on-error: false
