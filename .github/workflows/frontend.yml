# Build and Test Player App and Lobby View github action for chia-gaming
name: frontend.yml

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}--${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/long_lived/')) && github.sha || '' }}
  cancel-in-progress: true

on:
  push:
    branches:
      - base
      - dev
  release:
    types: [published]
  pull_request:
    branches:
      - "**"

permissions:
  id-token: write
  contents: read

env:
  RUST_VERSION: stable

jobs:
  frontend_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Job Env
        uses: Chia-Network/actions/setjobenv@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1

      # ── Build (mirrors ct.sh + run-local-demo.sh) ──────────────────

      - name: Build chialisp (hex files)
        run: |
          find clsp -name '*.hex' -delete
          cp build.rs.disabled build.rs
          cargo build

      - name: Build WASM (web + nodejs targets)
        run: |
          cd wasm
          wasm-pack build --out-dir=../front-end/dist --release --target=web
          wasm-pack build --out-dir=../front-end/node-pkg --release --target=nodejs

      - name: Build gaming-fe
        run: |
          cd front-end
          pnpm install --frozen-lockfile && pnpm run build

      - name: Build lobby-frontend
        run: |
          cd lobby
          pnpm install --frozen-lockfile
          pnpm --filter chia-gaming-lobby-frontend run build

      - name: Build lobby-service
        run: |
          cd lobby
          pnpm --filter chia-gaming-lobby-service run build

      - name: Build simulator
        run: cargo build --features sim-tests,sim-server --bin chia-gaming-sim

      # ── WASM/Jest tests (mirrors tools/local-wasm-tests.sh) ────────

      - name: Run WASM/Jest tests
        run: |
          SIM_BIN="./target/debug/chia-gaming-sim"
          RUST_LOG=error "$SIM_BIN" &
          SIM_PID=$!

          for i in $(seq 1 30); do
              if curl -s http://localhost:5800/get_peak >/dev/null 2>&1; then
                  echo "Simulator ready"
                  break
              fi
              if ! kill -0 "$SIM_PID" 2>/dev/null; then
                  echo "Simulator process died"
                  exit 1
              fi
              sleep 1
          done

          if ! curl -s http://localhost:5800/get_peak >/dev/null 2>&1; then
              echo "Simulator failed to start within 30 seconds"
              exit 1
          fi

          (cd front-end && pnpm run test)

          kill "$SIM_PID" 2>/dev/null || true

      # ── Headless browser test ───────────────────────────────────────

      # - name: Run headless browser test
