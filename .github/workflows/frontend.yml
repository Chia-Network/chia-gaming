      #     for i in $(seq 1 30); do
      #         if curl -s -X POST "http://localhost:${SIM_PORT}/get_peak" >/dev/null 2>&1; then
      #             echo "Simulator ready"
      #             break
      #         fi
      #         sleep 1
      #     done

      #     node static-server.js "$(pwd)" "$GAME_PORT" "$LOBBY_PORT" &
      #     SERVER_PID=$!

      #     (cd lobby/lobby-service && PORT=$LOBBY_SERVICE_PORT node ./dist/index-rollup.cjs --self "http://localhost:${LOBBY_PORT}") &

      #     sleep 8

